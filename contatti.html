<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contatti OfficinaePhone — Via Piazzano 66, Atessa (CH), Abruzzo." />
    <meta name="theme-color" content="#f97316" />
    <title>Contatti — OfficinaePhone</title>
  </head>
  <body>
    <a class="skip-link" href="#main">Vai al contenuto</a>

    <header class="site-header" role="banner" id="site-header"></header>

    <main id="main">
      <section class="section section--muted section--bokeh-head" aria-labelledby="contatti-title">
        <div class="bokeh-strip" aria-hidden="true">
          <img
            class="bokeh-strip__img"
            src="./images/hero/bokeh-backdrop.svg"
            alt=""
            width="1440"
            height="900"
            decoding="async"
          />
          <div class="bokeh-strip__fade"></div>
        </div>
        <div class="section__inner">
          <h1 id="contatti-title" class="section-title">Contatti e sede</h1>
          <div class="contact-grid">
            <div class="contact-card">
              <h2>OfficinaePhone</h2>
              <p>Via Piazzano, 66<br />66041 Atessa (CH)<br />Abruzzo, Italia</p>
              <p>
                <a href="tel:+393332909839">Mobile +39 333 290 9839</a><br />
                <a href="tel:+390872703236">Tel. 0872 703236</a>
              </p>
              <p>
                <a href="https://wa.me/393332909839" rel="noopener noreferrer" target="_blank">WhatsApp</a>
                ·
                <a
                  href="https://www.google.com/maps?q=Via+Piazzano,+66+Atessa+CH"
                  rel="noopener noreferrer"
                  target="_blank"
                  >Apri in Google Maps</a
                >
              </p>
            </div>
            <div class="contact-map">
              <iframe
                title="Mappa — Via Piazzano 66, Atessa"
                src="https://maps.google.com/maps?q=Via+Piazzano%2C+66%2C+Atessa+CH&t=&z=15&ie=UTF8&iwloc=&output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <nav class="bottom-nav" id="bottom-nav" aria-label="Navigazione mobile"></nav>

    <script type="module" src="./src/contatti.js"></script>
  </body>
</html>
