# Pubblica dist/ su GitHub Pages (artifact → deploy-pages).
#
# Se il sito mostra ancora /src/main.js: controlla in Actions che questa workflow
# finisca in verde; in caso di conflitti con altre run, vedi concurrency sotto.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# NON usare group "github-pages" né cancel su deploy in corso: il workflow
# interno "pages build and deployment" condivide meccanismi simili; annullare
# una run può far pubblicare un artifact vecchio / fallback non corretto.
# Allineato al template statico ufficiale GitHub (cancel-in-progress: false).
concurrency:
  group: pages-vite-officinaephone
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base /pub-repairs/ per GitHub Pages)
        run: npm run build:gh-pages
        env:
          VITE_GH_PAGES: '1'

      - name: Verifica output build (non deve restare entry dev /src/main.js)
        run: |
          set -euo pipefail
          if grep -qE '/src/main\.js|"./src/main\.js"' dist/index.html; then
            echo '::error file=dist/index.html::La build non ha trasformato il punto di ingresso (attesi /pub-repairs/assets/*.js).'
            exit 1
          fi
          if ! grep -qE '/pub-repairs/assets/[^"]+\.js' dist/index.html; then
            echo '::error file=dist/index.html::Manca lo script bundled con prefisso base /pub-repairs/.'
            exit 1
          fi
          echo "Anteprima head dist/index.html:"
          head -n 22 dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
