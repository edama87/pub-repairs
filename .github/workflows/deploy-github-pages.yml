# Pubblica la cartella dist/ su GitHub Pages tramite Actions (artifact → Pages).
#
# IMPORTANTE — se il sito carica /src/main.js (404):
#   In quel caso GitHub sta servendo l’index.html del repo (sorgente Vite), NON la build.
#   Vai su: Repo → Settings → Pages → Build and deployment → Source
#   e scegli SOLO "GitHub Actions" (disattiva "Deploy from a branch" / cartella / o /root).
#   La prima volta può servire l’approvazione dell’ambiente "github-pages"
#   (Settings → Environments → github-pages).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base /pub-repairs/ per GitHub Pages)
        run: npm run build:gh-pages
        env:
          VITE_GH_PAGES: '1'

      - name: Verifica output build (non deve restare entry dev /src/main.js)
        run: |
          set -euo pipefail
          if grep -qE '/src/main\.js|"./src/main\.js"' dist/index.html; then
            echo '::error file=dist/index.html::La build non ha trasformato il punto di ingresso (attesi /pub-repairs/assets/*.js).'
            exit 1
          fi
          if ! grep -qE '/pub-repairs/assets/[^"]+\.js' dist/index.html; then
            echo '::error file=dist/index.html::Manca lo script bundled con prefisso base /pub-repairs/.'
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
