# Pubblica dist/ su GitHub Pages (artifact → deploy-pages).
#
# Se il sito mostra ancora /src/main.js: controlla in Actions che questa workflow
# finisca in verde; in caso di conflitti con altre run, vedi concurrency sotto.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# NON usare group "github-pages" né cancel su deploy in corso: il workflow
# interno "pages build and deployment" condivide meccanismi simili; annullare
# una run può far pubblicare un artifact vecchio / fallback non corretto.
# Allineato al template statico ufficiale GitHub (cancel-in-progress: false).
concurrency:
  group: pages-vite-officinaephone
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base /pub-repairs/ per GitHub Pages)
        run: npm run build:gh-pages
        env:
          VITE_GH_PAGES: '1'

      - name: Verifica output build (nessun entry dev /src/*.js negli HTML)
        run: |
          set -euo pipefail
          for f in dist/*.html; do
            if grep -qE '/src/[a-zA-Z0-9_-]+\.js|"./src/[a-zA-Z0-9_-]+\.js"' "$f"; then
              echo "::error file=$f::Punto di ingresso dev non trasformato dalla build."
              exit 1
            fi
            if ! grep -qE '/pub-repairs/assets/[^"]+\.js' "$f"; then
              echo "::error file=$f::Manca script bundled con base /pub-repairs/."
              exit 1
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
